<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 网页标题：这里改成你自己的 -->
  <title>河北省互联网+不动产登记受理系统</title>

  <!-- 网页 logo / favicon：这里替换成你的图标地址 -->
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
    }

    img {
      width: 100vw;
      height: 100vh;
      display: block;
      object-fit: fill; /* 直接铺满全屏，不保留比例 */
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 这里替换成你的图片地址 -->
  <img src="/test/test.png" alt="full-screen-image">
</body>
</html>
