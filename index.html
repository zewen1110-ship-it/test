<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>河北省互联网+不动产登记受理系统</title>

  <link rel="icon" href="/test/OIP.webp" type="image/webp" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 100vw;
      height: 100vh;
      display: block;
      object-fit: contain; /* 保持原比例，完整显示 */
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img src="/test/test.jpg" alt="full-screen-image">
</body>
</html>
